name: Deploy Website

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - MergeNB Tests
    types:
      - completed

  push:
    branches:
      - main
    paths:
      - 'apps/website/**'
      - '.github/workflows/deploy-website.yml'

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '22'

      - uses: actions/configure-pages@v6

      - run: npm ci
        working-directory: apps/website

      - run: npm run sync:ci-report
        working-directory: apps/website
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MERGENB_SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}

      - run: npm run build
        working-directory: apps/website

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./apps/website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
