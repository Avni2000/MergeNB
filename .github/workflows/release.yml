name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "minor"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get previous version tag
        id: prev
        run: |
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: version
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          sed -i "s|img.shields.io/badge/version-.*-blue.svg|img.shields.io/badge/version-${VERSION}-blue.svg|" README.md

      - name: Update package-lock.json
        run: npm install --package-lock-only

      - name: Generate changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG="${{ steps.prev.outputs.tag }}"
          NEW_VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"

          if [ -n "$PREV_TAG" ]; then
            SINCE=$(git log -1 --format="%cI" "${PREV_TAG}")
          else
            SINCE="1970-01-01T00:00:00Z"
          fi

          ALL_PRS=$(gh pr list --state merged --base main --limit 500 --json number,title,author,mergedAt)

          NEW_PRS=$(echo "$ALL_PRS" | jq --arg since "$SINCE" \
            '[.[] | select(.mergedAt > $since) | select(.title | startswith("[RELEASE]") | not)] | sort_by(.mergedAt)')

          PREV_AUTHORS=$(echo "$ALL_PRS" | jq -r --arg since "$SINCE" \
            '[.[] | select(.mergedAt <= $since)] | .[].author.login' | sort -u)

          PR_LINES=$(echo "$NEW_PRS" | jq -r --arg repo "$REPO" \
            '.[] | "* \(.title) by @\(.author.login) in https://github.com/\($repo)/pull/\(.number)"')

          NEW_CONTRIB_LINES=$(echo "$NEW_PRS" | jq -r '.[].author.login' | sort -u | while read -r author; do
            if ! echo "$PREV_AUTHORS" | grep -qx "$author"; then
              PR_NUM=$(echo "$NEW_PRS" | jq -r --arg a "$author" 'first(.[] | select(.author.login == $a)) | .number')
              echo "* @${author} made their first contribution in https://github.com/${REPO}/pull/${PR_NUM}"
            fi
          done)

          {
            echo "## What's Changed"
            echo ""
            echo "$PR_LINES"
            echo ""
            if [ -n "$NEW_CONTRIB_LINES" ]; then
              echo "## New Contributors"
              echo ""
              echo "$NEW_CONTRIB_LINES"
              echo ""
            fi
            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${REPO}/compare/${PREV_TAG}...${NEW_VERSION}"
            fi
          } > RELEASE_NOTES.md


      - name: Build .vsix
        run: npx @vscode/vsce package
        
      - name: Commit and tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v${VERSION}"
          git checkout -b "${BRANCH}"
          git add package.json package-lock.json RELEASE_NOTES.md
          git commit -m "Release v${VERSION}"
          git tag --force "${VERSION}"
          git push origin "${BRANCH}" --force-with-lease
          git push origin "${VERSION}" --force
          
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v${VERSION}"
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "[RELEASE] v${VERSION}" \
            --body "Automated release PR for v${VERSION}" \
            --label "release"

      - name: Enable auto-merge (checks already green)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v${VERSION}"
          gh pr merge "${BRANCH}" --auto --merge

      - name: Wait for PR to merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v${VERSION}"
          for i in {1..30}; do
            STATE=$(gh pr view "${BRANCH}" --json state --jq '.state')
            if [ "$STATE" = "MERGED" ]; then
              echo "PR merged successfully"
              exit 0
            fi
            echo "Attempt $i/30: PR state is $STATE, waiting..."
            sleep 60
          done
          echo "Timeout: PR did not merge within 30 minutes"
          exit 1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "${VERSION}" \
            --title "v${VERSION}" \
            --notes-file RELEASE_NOTES.md \
            *.vsix
