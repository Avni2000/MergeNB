name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "minor"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get previous version tag
        id: prev
        run: |
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: version
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update package-lock.json
        run: npm install --package-lock-only

      - name: Generate changelog
        run: |
          PREV_TAG="${{ steps.prev.outputs.tag }}"
          NEW_VERSION="${{ steps.version.outputs.version }}"
          {
            echo "## What's Changed"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges
            else
              git log --pretty=format:"- %s (%h)" --no-merges
            fi
            echo ""
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${NEW_VERSION}"
            fi
          } > RELEASE_NOTES.md


      - name: Build .vsix
        run: npx @vscode/vsce package
        
      - name: Commit and tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v${VERSION}"
          git checkout -b "${BRANCH}"
          git add package.json package-lock.json RELEASE_NOTES.md
          git commit -m "Release v${VERSION}"
          git tag --force "${VERSION}"
          git push origin "${BRANCH}" --force-with-lease
          git push origin "${VERSION}" --force
          
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v${VERSION}"
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "[RELEASE] v${VERSION}" \
            --body "Automated release PR for v${VERSION}" \
            --label "release"
          gh pr merge "${BRANCH}" \
            --auto \
            --merge

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "${VERSION}" \
            --title "v${VERSION}" \
            --notes-file RELEASE_NOTES.md \
            *.vsix
